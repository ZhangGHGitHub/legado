name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Version Name
        id: version
        run: |
          VERSION=$(date -d "8 hour" -u +3.%y.%m%d%H)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Clear 18PlusList.txt
        run: |
          echo "" > app/src/main/assets/18PlusList.txt

      - name: Configure Keystore
        run: |
          cp .github/workflows/legado.jks app/legado.jks
          cat >> gradle.properties << EOF
          RELEASE_STORE_FILE=./legado.jks
          RELEASE_KEY_ALIAS=legado
          RELEASE_STORE_PASSWORD=gedoor_legado
          RELEASE_KEY_PASSWORD=gedoor_legado
          EOF

      - name: Build Beta Package
        run: |
          sed "/def version/c def version = \"${{ env.VERSION }}\"" app/build.gradle -i
          chmod +x gradlew
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          mkdir -p apk_output
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_release_${{ env.VERSION }}.apk \;

      - name: Build Formal Release Package
        run: |
          sed "s/applicationIdSuffix '.release'/applicationIdSuffix '.releaseS'/" app/build.gradle -i
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_beta_${{ env.VERSION }}.apk \;

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Legado ${{ env.VERSION }}
          files: apk_output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to Gitee
        uses: Yikun/hub-mirror-action@v1.5
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/mirror-233
          dst_key: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: user
          static_list: "legado"
          force_update: true

      - name: Create Gitee Release & Upload Assets
        run: |
          TAG="${{ env.VERSION }}"
          REPO="mirror-233/legado"
          TOKEN="${{ secrets.GITEE_TOKEN }}"

          # 1. 检查 release 是否已存在（重跑场景）
          echo "Checking if release for tag $TAG already exists..."
          EXISTING=$(curl -s "https://gitee.com/api/v5/repos/$REPO/releases/tags/$TAG?access_token=$TOKEN")
          RELEASE_ID=$(echo "$EXISTING" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

          if [ -n "$RELEASE_ID" ]; then
            echo "Release already exists (ID: $RELEASE_ID), reusing it."
          else
            # 2. Release 不存在，检查并创建 tag
            echo "Release not found, checking tag..."
            TAG_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitee.com/api/v5/repos/$REPO/tags/$TAG?access_token=$TOKEN")

            if [ "$TAG_CHECK" != "200" ]; then
              echo "Tag not found, creating from main..."
              curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
                -X POST "https://gitee.com/api/v5/repos/$REPO/tags" \
                -H "Content-Type: application/json" \
                -d "{\"access_token\":\"$TOKEN\",\"tag_name\":\"$TAG\",\"refs\":\"main\"}"
            fi

            # 3. 创建 Release
            echo "Creating release..."
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://gitee.com/api/v5/repos/$REPO/releases" \
              -H "Content-Type: application/json" \
              -d "{\"access_token\":\"$TOKEN\",\"tag_name\":\"$TAG\",\"name\":\"Legado $TAG\",\"target_commitish\":\"main\",\"body\":\"由 GitHub Actions 自动构建并发布\"}")
            echo "Create release response: $RESPONSE"

            HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
            if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
              echo "::error::Failed to create Gitee release (HTTP $HTTP_STATUS)"
              exit 1
            fi

            RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin.rsplit('\n',1)[0])['id'])" 2>/dev/null)
            echo "Created release ID: $RELEASE_ID"
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to get release ID"
            exit 1
          fi

          # 4. 上传 APK
          for file in apk_output/*.apk; do
            echo "Uploading $file to release $RELEASE_ID..."
            UPLOAD_RESPONSE=$(curl -s --max-time 300 -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://gitee.com/api/v5/repos/$REPO/releases/$RELEASE_ID/attach_files" \
              -F "access_token=$TOKEN" \
              -F "file=@$file")
            echo "Upload response: $UPLOAD_RESPONSE"

            UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
            if [ "$UPLOAD_STATUS" != "200" ] && [ "$UPLOAD_STATUS" != "201" ]; then
              echo "::warning::Failed to upload $file (HTTP $UPLOAD_STATUS)"
            fi
          done
